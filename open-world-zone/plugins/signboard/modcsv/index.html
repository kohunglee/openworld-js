<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #fff;
            color: #000;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题区域 */
        header {
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 24px;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .status-bar {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            font-style: italic;
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            background: #fff;
            border: 1px solid #000;
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #000;
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            background: #fff;
            color: #000;
        }

        .btn-primary {
            background: #000;
            color: #fff;
        }

        .btn-primary:hover {
            background: #333;
        }

        .search-box {
            border: 1px solid #000;
            padding: 8px 12px;
            font-family: inherit;
            font-size: 13px;
            flex: 1;
            min-width: 150px;
            max-width: 300px;
        }

        .search-box:focus {
            outline: 2px solid #000;
            outline-offset: -2px;
        }

        /* 笔记列表 */
        .notes-container {
            border: 1px solid #000;
            min-height: 400px;
        }

        .notes-header {
            display: grid;
            grid-template-columns: 120px 1fr 80px 60px;
            border-bottom: 2px solid #000;
            padding: 10px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #f5f5f5;
        }

        .notes-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .note-item {
            display: grid;
            grid-template-columns: 120px 1fr 80px 60px;
            border-bottom: 1px solid #ccc;
            padding: 10px;
            font-size: 14px;
            transition: background 0.1s;
        }

        .note-item:hover {
            background: #f9f9f9;
        }

        .note-target {
            font-weight: bold;
            color: #333;
        }

        .note-content {
            padding: 0 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .note-date {
            font-size: 11px;
            color: #666;
        }

        .note-actions {
            display: flex;
            gap: 5px;
        }

        .note-actions button {
            background: none;
            border: 1px solid #999;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
        }

        .note-actions button:hover {
            border-color: #000;
            background: #f0f0f0;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #999;
            font-style: italic;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border: 2px solid #000;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            border-bottom: 1px solid #000;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 16px;
            font-weight: normal;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 0 5px;
        }

        .modal-body {
            padding: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            border: 1px solid #000;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: 2px solid #000;
            outline-offset: -2px;
        }

        .modal-footer {
            border-top: 1px solid #ccc;
            padding: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 统计信息 */
        .stats {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ccc;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #000;
            color: #fff;
            padding: 12px 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2000;
        }

        .toast.show {
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .notes-header,
            .note-item {
                grid-template-columns: 1fr;
                gap: 5px;
            }

            .notes-header {
                display: none;
            }

            .note-item {
                padding: 15px 10px;
            }

            .note-target::before {
                content: 'ID: ';
                color: #999;
            }

            .note-date::before {
                content: '日期: ';
            }

            .note-actions {
                justify-content: flex-end;
                margin-top: 5px;
            }
        }

        /* 可拖拽排序指示 */
        .note-item.dragging {
            opacity: 0.5;
            background: #f0f0f0;
        }

        /* 快捷键提示 */
        .shortcuts {
            font-size: 11px;
            color: #999;
            margin-top: 15px;
        }

        .shortcuts kbd {
            border: 1px solid #ccc;
            padding: 1px 4px;
            font-family: inherit;
        }

        /* 启动遮罩 */
        .startup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            transition: opacity 0.3s;
        }

        .startup-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .startup-overlay h2 {
            font-size: 28px;
            font-weight: normal;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .startup-overlay p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .startup-overlay .btn {
            padding: 15px 40px;
            font-size: 16px;
        }

        .startup-overlay .hint {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>[ 笔记系统 ]</h1>
            <div class="status-bar">
                <span class="file-name" id="fileName">未打开文件</span>
                <span id="modified" style="display:none; color: #c00;">[ 已修改 ]</span>
                <span id="noteCount">0 条笔记</span>
            </div>
        </header>

        <div class="toolbar">
            <button class="btn" id="btnOpen">打开文件</button>
            <button class="btn btn-primary" id="btnNew" disabled>新建笔记</button>
            <button class="btn" id="btnSave" disabled>保存</button>
            <button class="btn" id="btnSaveAs" disabled>另存为</button>
            <button class="btn" id="btnForget" disabled title="取消记住当前文件">取消记住</button>
            <input type="text" class="search-box" id="searchBox" placeholder="搜索笔记..." disabled>
        </div>

        <div class="notes-container">
            <div class="notes-header">
                <div>编号</div>
                <div>内容</div>
                <div>日期</div>
                <div>操作</div>
            </div>
            <div class="notes-list" id="notesList">
                <div class="empty-state">
                    点击「打开文件」选择 CSV 文件开始
                </div>
            </div>
        </div>

        <div class="stats">
            <span id="charCount">字符统计: 0</span>
            <span id="lastSaved">-</span>
        </div>

        <div class="shortcuts">
            快捷键: <kbd>N</kbd> 新建 | <kbd>S</kbd> 保存 | <kbd>Esc</kbd> 关闭弹窗
        </div>
    </div>

    <!-- 编辑/新建模态框 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新建笔记</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>编号 (target)</label>
                    <input type="text" id="inputTarget" placeholder="如: sign0001">
                </div>
                <div class="form-group">
                    <label>内容 (content)</label>
                    <textarea id="inputContent" placeholder="输入笔记内容..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" id="btnCancel">取消</button>
                <button class="btn btn-primary" id="btnSaveNote">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast 消息 -->
    <div class="toast" id="toast"></div>

    <!-- 启动遮罩 -->
    <div class="startup-overlay" id="startupOverlay">
        <h2>[ 笔记系统 ]</h2>
        <p>点击下方按钮选择 test.csv 文件开始</p>
        <button class="btn btn-primary" id="btnStart">选择文件并开始</button>
        <p class="hint">选择一次后，后续保存将自动写入该文件</p>
    </div>

    <script>
        // ========== 状态管理 ==========
        let fileHandle = null;
        let notes = [];
        let filteredNotes = [];
        let currentEditIndex = -1;
        let isModified = false;
        const DB_NAME = 'notesDB';
        const STORE_NAME = 'fileHandles';
        const HANDLE_KEY = 'testCSV';

        // ========== DOM 元素 ==========
        const btnOpen = document.getElementById('btnOpen');
        const btnNew = document.getElementById('btnNew');
        const btnSave = document.getElementById('btnSave');
        const btnSaveAs = document.getElementById('btnSaveAs');
        const btnForget = document.getElementById('btnForget');
        const searchBox = document.getElementById('searchBox');
        const notesList = document.getElementById('notesList');
        const fileName = document.getElementById('fileName');
        const modified = document.getElementById('modified');
        const noteCount = document.getElementById('noteCount');
        const charCount = document.getElementById('charCount');
        const lastSaved = document.getElementById('lastSaved');
        const editModal = document.getElementById('editModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalClose = document.getElementById('modalClose');
        const inputTarget = document.getElementById('inputTarget');
        const inputContent = document.getElementById('inputContent');
        const btnCancel = document.getElementById('btnCancel');
        const btnSaveNote = document.getElementById('btnSaveNote');
        const toast = document.getElementById('toast');
        const startupOverlay = document.getElementById('startupOverlay');
        const btnStart = document.getElementById('btnStart');

        // ========== 工具函数 ==========
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function setModified(value) {
            isModified = value;
            modified.style.display = value ? 'inline' : 'none';
        }

        // ========== IndexedDB 操作 ==========
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
            });
        }

        async function saveFileHandle(handle) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(handle, HANDLE_KEY);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
                db.close();
            });
        }

        async function loadFileHandle() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(HANDLE_KEY);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
                db.close();
            });
        }

        async function clearFileHandle() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.delete(HANDLE_KEY);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
                db.close();
            });
        }

        function generateTargetId() {
            // 找到最大的编号
            let maxNum = 0;
            notes.forEach(n => {
                const match = n.target.match(/sign(\d+)/);
                if (match) {
                    maxNum = Math.max(maxNum, parseInt(match[1]));
                }
            });
            return 'sign' + String(maxNum + 1).padStart(4, '0');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return `${d.getMonth()+1}/${d.getDate()}`;
        }

        function updateStats() {
            noteCount.textContent = `${notes.length} 条笔记`;
            const totalChars = notes.reduce((sum, n) => sum + (n.content?.length || 0), 0);
            charCount.textContent = `字符统计: ${totalChars}`;
        }

        // ========== 文件操作 ==========
        async function openFile() {
            try {
                // 检查浏览器支持
                if (!('showOpenFilePicker' in window)) {
                    showToast('浏览器不支持 File System Access API');
                    alert('您的浏览器不支持 File System Access API。\n\n请使用 Chrome 86+、Edge 86+ 等现代浏览器。');
                    return;
                }

                [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'CSV 文件',
                        accept: { 'text/csv': ['.csv'] }
                    }]
                });

                // 保存文件句柄到 IndexedDB
                await saveFileHandle(fileHandle);

                const file = await fileHandle.getFile();
                const content = await file.text();

                // 使用 PapaParse 解析 CSV
                const result = Papa.parse(content, {
                    header: true,
                    skipEmptyLines: true
                });

                notes = result.data.map((row, index) => ({
                    target: row.target || `sign${String(index + 1).padStart(4, '0')}`,
                    content: row.content || '',
                    date: row.date || new Date().toISOString()
                }));

                fileName.textContent = file.name + ' (已记住)';
                setModified(false);
                enableControls(true);
                renderNotes();
                showToast(`已加载 ${notes.length} 条笔记`);
                updateStats();

            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    showToast('打开文件失败');
                }
            }
        }

        async function saveFile() {
            // 如果没有文件句柄，先让用户选择保存位置
            if (!fileHandle) {
                await saveFileAs();
                return;
            }

            try {
                // 转换为 CSV
                const csvContent = Papa.unparse(notes);

                const writable = await fileHandle.createWritable();
                await writable.write(csvContent);
                await writable.close();

                setModified(false);
                lastSaved.textContent = `上次保存: ${new Date().toLocaleTimeString()}`;
                showToast('保存成功');
            } catch (err) {
                console.error(err);
                showToast('保存失败');
            }
        }

        async function saveFileAs() {
            try {
                const handle = await window.showSaveFilePicker({
                    types: [{
                        description: 'CSV 文件',
                        accept: { 'text/csv': ['.csv'] }
                    }],
                    suggestedName: 'test.csv'
                });

                fileHandle = handle;
                fileName.textContent = handle.name;
                await saveFile();
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error(err);
                    showToast('另存为失败');
                }
            }
        }

        // ========== 笔记操作 ==========
        function enableControls(enabled) {
            btnNew.disabled = !enabled;
            btnSave.disabled = !enabled;
            btnSaveAs.disabled = !enabled;
            btnForget.disabled = !enabled;
            searchBox.disabled = !enabled;
        }

        // 取消记住文件
        async function forgetFile() {
            await clearFileHandle();
            fileHandle = null;
            fileName.textContent = fileName.textContent.replace(' (已记住)', '');
            showToast('已取消记住，下次需要重新选择文件');
        }

        function renderNotes() {
            const searchTerm = searchBox.value.toLowerCase();
            filteredNotes = notes.filter(note =>
                note.target.toLowerCase().includes(searchTerm) ||
                note.content.toLowerCase().includes(searchTerm)
            );

            if (filteredNotes.length === 0) {
                notesList.innerHTML = `
                    <div class="empty-state">
                        ${notes.length === 0 ? '暂无笔记，点击「新建笔记」添加' : '没有匹配的结果'}
                    </div>
                `;
                return;
            }

            notesList.innerHTML = filteredNotes.map((note, i) => {
                const realIndex = notes.indexOf(note);
                return `
                    <div class="note-item" data-index="${realIndex}">
                        <div class="note-target">${escapeHtml(note.target)}</div>
                        <div class="note-content">${escapeHtml(note.content)}</div>
                        <div class="note-date">${formatDate(note.date)}</div>
                        <div class="note-actions">
                            <button onclick="editNote(${realIndex})">编辑</button>
                            <button onclick="deleteNote(${realIndex})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openModal(isNew = true, index = -1) {
            currentEditIndex = index;
            modalTitle.textContent = isNew ? '新建笔记' : '编辑笔记';

            if (isNew) {
                inputTarget.value = generateTargetId();
                inputContent.value = '';
            } else {
                inputTarget.value = notes[index].target;
                inputContent.value = notes[index].content;
            }

            editModal.classList.add('active');
            inputContent.focus();
        }

        function closeModal() {
            editModal.classList.remove('active');
            currentEditIndex = -1;
        }

        function saveNote() {
            const target = inputTarget.value.trim();
            const content = inputContent.value.trim();

            if (!target) {
                showToast('请输入编号');
                return;
            }

            if (currentEditIndex === -1) {
                // 新建
                notes.push({
                    target,
                    content,
                    date: new Date().toISOString()
                });
            } else {
                // 编辑
                notes[currentEditIndex].target = target;
                notes[currentEditIndex].content = content;
                notes[currentEditIndex].date = new Date().toISOString();
            }

            setModified(true);
            renderNotes();
            updateStats();
            closeModal();
            showToast(currentEditIndex === -1 ? '已添加' : '已更新');
        }

        function editNote(index) {
            openModal(false, index);
        }

        function deleteNote(index) {
            if (confirm(`确定要删除 "${notes[index].target}" 吗?`)) {
                notes.splice(index, 1);
                setModified(true);
                renderNotes();
                updateStats();
                showToast('已删除');
            }
        }

        // ========== 事件绑定 ==========
        btnOpen.addEventListener('click', openFile);
        btnNew.addEventListener('click', () => openModal(true));
        btnSave.addEventListener('click', saveFile);
        btnSaveAs.addEventListener('click', saveFileAs);
        btnForget.addEventListener('click', forgetFile);
        modalClose.addEventListener('click', closeModal);
        btnCancel.addEventListener('click', closeModal);
        btnSaveNote.addEventListener('click', saveNote);

        searchBox.addEventListener('input', renderNotes);

        // 点击遮罩关闭
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) closeModal();
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // Esc 关闭弹窗
            if (e.key === 'Escape') {
                closeModal();
            }
            // N 新建 (已加载数据后)
            if (e.key === 'n' && !e.ctrlKey && !e.metaKey && notes.length > 0 && !editModal.classList.contains('active')) {
                if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                    openModal(true);
                }
            }
            // Ctrl+S 保存
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (notes.length > 0) {
                    saveFile();
                }
            }
        });

        // 页面关闭前提醒保存
        window.addEventListener('beforeunload', (e) => {
            if (isModified) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // 自动编号输入框回车跳到内容
        inputTarget.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                inputContent.focus();
            }
        });

        // ========== 自动加载默认 CSV ==========
        async function loadDefaultCSV() {
            try {
                const response = await fetch('../test.csv');
                if (!response.ok) throw new Error('文件不存在');

                const content = await response.text();
                const result = Papa.parse(content, {
                    header: true,
                    skipEmptyLines: true
                });

                notes = result.data.map((row, index) => ({
                    target: row.target || `sign${String(index + 1).padStart(4, '0')}`,
                    content: row.content || '',
                    date: row.date || new Date().toISOString()
                }));

                fileName.textContent = 'test.csv (只读加载)';
                enableControls(true);
                renderNotes();
                updateStats();
                showToast(`已自动加载 ${notes.length} 条笔记`);
            } catch (err) {
                console.log('自动加载失败，请手动打开文件:', err.message);
                // 不显示错误，让用户手动打开
            }
        }

        // ========== 启动流程 ==========
        async function startApp() {
            // 检查浏览器支持
            if (!('showOpenFilePicker' in window)) {
                startupOverlay.classList.add('hidden');
                showToast('浏览器不支持 File System Access API，使用只读模式');
                loadDefaultCSV();
                return;
            }

            try {
                // 自动弹出文件选择器
                [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'CSV 文件',
                        accept: { 'text/csv': ['.csv'] }
                    }]
                });

                // 保存文件句柄到 IndexedDB
                await saveFileHandle(fileHandle);

                const file = await fileHandle.getFile();
                const content = await file.text();

                const result = Papa.parse(content, {
                    header: true,
                    skipEmptyLines: true
                });

                notes = result.data.map((row, index) => ({
                    target: row.target || `sign${String(index + 1).padStart(4, '0')}`,
                    content: row.content || '',
                    date: row.date || new Date().toISOString()
                }));

                fileName.textContent = file.name;
                setModified(false);
                enableControls(true);
                renderNotes();
                updateStats();

                // 隐藏启动遮罩
                startupOverlay.classList.add('hidden');
                showToast(`已加载 ${notes.length} 条笔记，可直接保存`);

            } catch (err) {
                if (err.name === 'AbortError') {
                    // 用户取消了选择，回退到只读模式
                    startupOverlay.classList.add('hidden');
                    loadDefaultCSV();
                    showToast('未选择文件，使用只读模式');
                } else {
                    console.error(err);
                    startupOverlay.classList.add('hidden');
                    loadDefaultCSV();
                }
            }
        }

        // 尝试从 IndexedDB 恢复文件句柄
        async function tryRestoreHandle() {
            try {
                const savedHandle = await loadFileHandle();
                if (!savedHandle) {
                    return false;
                }

                // 请求权限
                const permission = await savedHandle.queryPermission();
                if (permission === 'granted') {
                    fileHandle = savedHandle;
                    return true;
                }

                // 如果没有权限，尝试请求
                const requestPermission = await savedHandle.requestPermission();
                if (requestPermission === 'granted') {
                    fileHandle = savedHandle;
                    return true;
                }

                return false;
            } catch (err) {
                console.log('恢复文件句柄失败:', err);
                return false;
            }
        }

        // 使用已保存的文件句柄加载
        async function loadFromSavedHandle() {
            try {
                const file = await fileHandle.getFile();
                const content = await file.text();

                const result = Papa.parse(content, {
                    header: true,
                    skipEmptyLines: true
                });

                notes = result.data.map((row, index) => ({
                    target: row.target || `sign${String(index + 1).padStart(4, '0')}`,
                    content: row.content || '',
                    date: row.date || new Date().toISOString()
                }));

                fileName.textContent = file.name + ' (已记住)';
                setModified(false);
                enableControls(true);
                renderNotes();
                updateStats();

                // 隐藏启动遮罩
                startupOverlay.classList.add('hidden');
                showToast(`已自动加载 ${notes.length} 条笔记`);
                return true;
            } catch (err) {
                console.error('加载已保存的文件失败:', err);
                // 清除无效的句柄
                await clearFileHandle();
                return false;
            }
        }

        // 初始化：尝试恢复已保存的文件
        async function init() {
            // 检查浏览器支持
            if (!('showOpenFilePicker' in window)) {
                startupOverlay.classList.add('hidden');
                showToast('浏览器不支持 File System Access API，使用只读模式');
                loadDefaultCSV();
                return;
            }

            // 尝试恢复已保存的文件句柄
            const restored = await tryRestoreHandle();
            if (restored && fileHandle) {
                const loaded = await loadFromSavedHandle();
                if (loaded) {
                    return; // 成功加载，不需要显示启动界面
                }
            }

            // 没有已保存的句柄或加载失败，显示启动界面
            // 启动界面会通过按钮触发 startApp()
        }

        // 点击开始按钮
        btnStart.addEventListener('click', startApp);

        // 页面加载时初始化
        init();
    </script>
</body>
</html>
