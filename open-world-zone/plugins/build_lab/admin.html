<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信息板管理 - build_lab</title>
  <script src="css/tailwind.min.js"></script>
  <style>
    .code-textarea {
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      tab-size: 2;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-100 text-gray-800 py-10 px-4">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-center mb-2">信息板管理</h1>
    <p class="text-center text-gray-500 text-sm mb-8">编辑 → 保存 → 刷新 3D 页面看效果</p>

    <!-- Tab 切换 -->
    <div class="flex justify-center gap-2 mb-6">
      <button onclick="switchTab('boards')" id="tab-boards" class="px-5 py-2 rounded-lg font-medium transition bg-blue-500 text-white">
        信息板编辑
      </button>
      <button onclick="switchTab('canvas')" id="tab-canvas" class="px-5 py-2 rounded-lg font-medium transition bg-gray-200 text-gray-600 hover:bg-gray-300">
        Canvas 函数库
      </button>
    </div>

    <!-- 信息板编辑区 -->
    <div id="boards-panel">
      <div id="boards" class="space-y-4">
        <div class="bg-white rounded-xl p-10 text-center text-gray-400 shadow-sm border border-gray-200">
          加载中...
        </div>
      </div>

      <div class="flex justify-center gap-3 mt-8">
        <button onclick="loadData()" class="px-6 py-3 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-lg shadow transition hover:-translate-y-0.5 active:translate-y-0">
          重新加载
        </button>
        <button onclick="saveData()" id="saveBtn" class="px-6 py-3 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-lg shadow transition hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
          保存到文件
        </button>
      </div>
    </div>

    <!-- Canvas 函数库编辑区 -->
    <div id="canvas-panel" class="hidden">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- 左侧：函数列表 -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-semibold text-gray-700">函数列表</h3>
            <button onclick="showAddFuncDialog()" class="px-3 py-1 bg-blue-500 hover:bg-blue-600 text-white text-sm rounded-lg transition">
              + 新增
            </button>
          </div>
          <div id="func-list" class="space-y-2">
            <div class="text-gray-400 text-sm text-center py-4">加载中...</div>
          </div>
        </div>

        <!-- 右侧：编辑器 + 预览 -->
        <div class="lg:col-span-2 space-y-4">
          <!-- 代码编辑器 -->
          <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-3">
              <h3 class="font-semibold text-gray-700">代码编辑</h3>
              <div class="flex gap-2">
                <button onclick="previewCanvas()" class="px-3 py-1 bg-purple-500 hover:bg-purple-600 text-white text-sm rounded-lg transition">
                  预览
                </button>
                <button onclick="saveCanvasFunc()" id="saveCanvasBtn" class="px-3 py-1 bg-green-500 hover:bg-green-600 text-white text-sm rounded-lg transition disabled:opacity-50">
                  保存
                </button>
              </div>
            </div>
            <div id="func-name-display" class="text-sm text-gray-500 mb-2">请选择一个函数</div>
            <textarea id="code-editor" class="code-textarea w-full h-64 p-3 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-400 resize-y" placeholder="// 在这里编写 Canvas 绘制代码
// 可用变量: ctx (Canvas 2D 上下文), w (宽度), h (高度)
// 示例:
// ctx.fillStyle = '#ff0000';
// ctx.fillRect(0, 0, w, h);"></textarea>
          </div>

          <!-- Canvas 预览 -->
          <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
            <h3 class="font-semibold text-gray-700 mb-3">实时预览</h3>
            <div class="flex justify-center bg-gray-50 rounded-lg p-4">
              <canvas id="preview-canvas" width="300" height="200" class="border border-gray-300 rounded bg-white"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="status" class="hidden fixed top-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg text-sm shadow-lg cursor-pointer max-w-lg" onclick="hideStatus()"></div>

    <div class="mt-8 p-4 bg-white rounded-lg border border-gray-200 text-center text-gray-500 text-sm">
      <strong>使用说明：</strong><br>
      1. 启动服务器：<code class="bg-gray-100 px-1.5 py-0.5 rounded text-amber-600">python3 server.py</code><br>
      2. 编辑上面的内容，点击「保存」或按 <kbd class="bg-gray-200 px-1 rounded">Cmd+S</kbd><br>
      3. 刷新 3D 页面即可看到更新
    </div>
  </div>

  <!-- 新增函数弹窗 -->
  <div id="add-func-dialog" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-80 shadow-xl">
      <h3 class="font-semibold text-lg mb-4">新增绘制函数</h3>
      <input type="text" id="new-func-name" placeholder="函数名（如 drawStar）"
        class="w-full p-3 border border-gray-200 rounded-lg mb-4 focus:outline-none focus:border-blue-400">
      <div class="flex gap-2 justify-end">
        <button onclick="hideAddFuncDialog()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-lg transition">取消</button>
        <button onclick="addNewFunc()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition">创建</button>
      </div>
    </div>
  </div>

  <script>
    const API_SIGNS = '/api/signs';
    const API_CANVAS = '/api/canvas-lib';
    let boardsData = [];
    let canvasFuncs = {};
    let selectedFunc = null;

    // ========== 快捷键 Cmd+S 保存 ==========
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        const canvasPanel = document.getElementById('canvas-panel');
        if (!canvasPanel.classList.contains('hidden') && selectedFunc) {
          saveCanvasFunc();
        } else {
          saveData();
        }
      }
    });

    // ========== Tab 切换 ==========
    function switchTab(tab) {
      document.getElementById('boards-panel').classList.toggle('hidden', tab !== 'boards');
      document.getElementById('canvas-panel').classList.toggle('hidden', tab !== 'canvas');
      document.getElementById('tab-boards').className = tab === 'boards'
        ? 'px-5 py-2 rounded-lg font-medium transition bg-blue-500 text-white'
        : 'px-5 py-2 rounded-lg font-medium transition bg-gray-200 text-gray-600 hover:bg-gray-300';
      document.getElementById('tab-canvas').className = tab === 'canvas'
        ? 'px-5 py-2 rounded-lg font-medium transition bg-blue-500 text-white'
        : 'px-5 py-2 rounded-lg font-medium transition bg-gray-200 text-gray-600 hover:bg-gray-300';

      if (tab === 'canvas') {
        loadCanvasLib();
      }
    }

    // ========== 信息板功能 ==========
    async function loadData() {
      showStatus('加载中...', 'bg-blue-50 text-blue-700 border border-blue-200');
      try {
        const res = await fetch(API_SIGNS);
        if (!res.ok) throw new Error('请求失败');
        const data = await res.json();
        boardsData = data.boards || [];
        render();
        showStatus('数据加载成功', 'bg-green-50 text-green-700 border border-green-200');

      } catch (e) {
        showStatus('❌ 加载失败: ' + e.message, 'bg-red-50 text-red-700 border border-red-200');
      }
    }

    function render() {
      const container = document.getElementById('boards');
      if (boardsData.length === 0) {
        container.innerHTML = '<div class="bg-white rounded-xl p-6 text-gray-400 shadow-sm border border-gray-200">暂无数据</div>';
        return;
      }
      container.innerHTML = boardsData.map((board, i) => {
        const mode = board.mode || 'text';
        const modeLabels = { text: '文字', image: '图片', canvas: 'Canvas' };
        const modeClasses = { text: 'bg-blue-100 text-blue-700', image: 'bg-amber-100 text-amber-700', canvas: 'bg-purple-100 text-purple-700' };

        let editorHtml = '';
        if (mode === 'text') {
          editorHtml = `
            <textarea
              class="w-full min-h-[100px] p-3 border border-gray-200 rounded-lg bg-gray-50 text-gray-800 resize-y focus:outline-none focus:border-blue-400 focus:bg-white transition"
              oninput="updateBoard(${i}, this.value)"
              placeholder="输入文字内容..."
            >${escapeHtml(board.content || '')}</textarea>
          `;
        } else if (mode === 'image') {
          editorHtml = `
            <div class="flex gap-3">
              <input
                type="text"
                class="flex-1 p-3 border border-gray-200 rounded-lg bg-gray-50 text-gray-800 text-sm focus:outline-none focus:border-blue-400 focus:bg-white transition"
                value="${escapeHtml(board.content || '')}"
                oninput="updateBoard(${i}, this.value); this.nextElementSibling.src = this.value"
                placeholder="输入图片URL..."
              />
              <img
                class="w-[120px] h-[80px] rounded-lg bg-gray-200 object-cover border border-gray-200"
                src="${escapeHtml(board.content || '')}"
                onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 80%22><text x=%2260%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>预览失败</text></svg>'"
              />
            </div>
          `;
        } else if (mode === 'canvas') {
          const funcOptions = Object.keys(canvasFuncs).map(name =>
            `<option value="${name}" ${board.content === name ? 'selected' : ''}>${name}</option>`
          ).join('');
          // 如果当前值不在函数库中，也显示出来（防止数据丢失）
          const fallback = (board.content && !canvasFuncs[board.content])
            ? `<option value="${board.content}" selected>${board.content}</option>` : '';
          editorHtml = `
            <select
              data-canvas-select data-board-index="${i}"
              class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 text-gray-800 focus:outline-none focus:border-blue-400 focus:bg-white transition"
              onchange="updateBoard(${i}, this.value)"
              onfocus="refreshCanvasOptions()"
            >
              <option value="">-- 选择绘制函数 --</option>
              ${fallback}${funcOptions}
            </select>
            <div class="mt-2">
              <canvas id="board-preview-${i}" width="200" height="100" class="border border-gray-200 rounded bg-white"></canvas>
            </div>
          `;
        }

        return `
          <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-200">
            <label class="block mb-3 font-semibold text-blue-600">
              ${board.name || board.id}
              <span class="font-normal text-gray-400">(${board.id})</span>
              <span class="ml-2 px-2 py-0.5 rounded text-xs font-medium ${modeClasses[mode] || ''}">${modeLabels[mode] || mode}</span>
            </label>
            ${editorHtml}
          </div>
        `;
      }).join('');

      // 渲染 canvas 预览
      boardsData.forEach((board, i) => {
        if (board.mode === 'canvas' && board.content) {
          previewBoardCanvas(i, board.content);
        }
      });
    }

    function previewBoardCanvas(index, funcName) {
      const canvas = document.getElementById(`board-preview-${index}`);
      if (!canvas || !canvasFuncs[funcName]) return;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      try {
        const func = new Function('ctx', 'w', 'h', canvasFuncs[funcName]);
        func(ctx, canvas.width, canvas.height);
      } catch (e) {
        console.error('预览错误:', e);
      }
    }

    function updateBoard(index, value) {
      // Canvas 模式不允许清空（防止误选占位符覆盖原有值）
      if (boardsData[index].mode === 'canvas' && value === '') return;
      boardsData[index].content = value;
      if (boardsData[index].mode === 'canvas') {
        previewBoardCanvas(index, value);
      }
    }

    async function saveData() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        const payload = { version: 1, boards: boardsData };
        const res = await fetch(API_SIGNS, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('保存失败');
        const result = await res.json();
        showStatus('OK ' + result.message + ' — 现在去刷新 3D 页面吧！', 'bg-green-50 text-green-700 border border-green-200');
      } catch (e) {
        showStatus('保存失败: ' + e.message, 'bg-red-50 text-red-700 border border-red-200');
      } finally {
        btn.disabled = false;
        btn.textContent = '保存到文件';
      }
    }

    // ========== 动态刷新 Canvas 下拉框 ==========
    async function refreshCanvasOptions() {
      try {
        const res = await fetch(API_CANVAS);
        if (!res.ok) return;
        const data = await res.json();
        canvasFuncs = data.functions || {};
        document.querySelectorAll('[data-canvas-select]').forEach(sel => {
          const idx = parseInt(sel.dataset.boardIndex);
          const currentVal = boardsData[idx] ? boardsData[idx].content : '';
          const fallback = (currentVal && !canvasFuncs[currentVal])
            ? `<option value="${currentVal}" selected>${currentVal}</option>` : '';
          sel.innerHTML = '<option value="">-- 选择绘制函数 --</option>' +
            fallback +
            Object.keys(canvasFuncs).map(n => `<option value="${n}" ${n === currentVal ? 'selected' : ''}>${n}</option>`).join('');
        });
      } catch(e) {}
    }

    // ========== Canvas 函数库功能 ==========
    async function loadCanvasLib() {
      try {
        const res = await fetch(API_CANVAS);
        if (!res.ok) throw new Error('请求失败');
        const data = await res.json();
        canvasFuncs = data.functions || {};
        renderFuncList();
      } catch (e) {
        document.getElementById('func-list').innerHTML = '<div class="text-red-500 text-sm text-center py-4">加载失败: ' + e.message + '</div>';
      }
    }

    function renderFuncList() {
      const container = document.getElementById('func-list');
      const funcNames = Object.keys(canvasFuncs);

      if (funcNames.length === 0) {
        container.innerHTML = '<div class="text-gray-400 text-sm text-center py-4">暂无函数</div>';
        return;
      }

      container.innerHTML = funcNames.map(name => `
        <div class="flex items-center justify-between p-2 rounded-lg cursor-pointer hover:bg-gray-100 transition ${selectedFunc === name ? 'bg-blue-50 border border-blue-200' : ''}"
          onclick="selectFunc('${name}')">
          <span class="font-mono text-sm">${name}</span>
          <button onclick="event.stopPropagation(); deleteFunc('${name}')" class="text-red-400 hover:text-red-600 text-xs px-1">删除</button>
        </div>
      `).join('');
    }

    function selectFunc(name) {
      selectedFunc = name;
      document.getElementById('func-name-display').textContent = `编辑函数: ${name}`;
      document.getElementById('code-editor').value = canvasFuncs[name] || '';
      renderFuncList();
      previewCanvas();
    }

    async function saveCanvasFunc() {
      if (!selectedFunc) {
        showStatus('请先选择一个函数', 'bg-amber-50 text-amber-700 border border-amber-200');
        return;
      }

      const btn = document.getElementById('saveCanvasBtn');
      btn.disabled = true;

      try {
        const res = await fetch(API_CANVAS, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: selectedFunc,
            body: document.getElementById('code-editor').value
          })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || '保存失败');
        }

        canvasFuncs[selectedFunc] = document.getElementById('code-editor').value;
        showStatus(`函数 ${selectedFunc} 已保存`, 'bg-green-50 text-green-700 border border-green-200');

      } catch (e) {
        showStatus('保存失败: ' + e.message, 'bg-red-50 text-red-700 border border-red-200');
      } finally {
        btn.disabled = false;
      }
    }

    function previewCanvas() {
      const canvas = document.getElementById('preview-canvas');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (!selectedFunc) return;

      try {
        const code = document.getElementById('code-editor').value;
        const func = new Function('ctx', 'w', 'h', code);
        func(ctx, canvas.width, canvas.height);
      } catch (e) {
        ctx.fillStyle = '#fee2e2';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#dc2626';
        ctx.font = '12px monospace';
        ctx.fillText('Error: ' + e.message, 10, 20);
      }
    }

    // 编辑器实时预览
    document.getElementById('code-editor').addEventListener('input', () => {
      clearTimeout(window._previewTimer);
      window._previewTimer = setTimeout(previewCanvas, 300);
    });

    function showAddFuncDialog() {
      document.getElementById('add-func-dialog').classList.remove('hidden');
      document.getElementById('new-func-name').value = '';
      document.getElementById('new-func-name').focus();
    }

    function hideAddFuncDialog() {
      document.getElementById('add-func-dialog').classList.add('hidden');
    }

    async function addNewFunc() {
      const name = document.getElementById('new-func-name').value.trim();
      if (!name) {
        alert('请输入函数名');
        return;
      }

      try {
        const res = await fetch(API_CANVAS + '/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || '创建失败');
        }

        hideAddFuncDialog();
        await loadCanvasLib();
        selectFunc(name);
        showStatus(`函数 ${name} 已创建`, 'bg-green-50 text-green-700 border border-green-200');

      } catch (e) {
        alert('创建失败: ' + e.message);
      }
    }

    async function deleteFunc(name) {
      if (!confirm(`确定删除函数 ${name} 吗？`)) return;

      try {
        const res = await fetch(API_CANVAS + '/' + encodeURIComponent(name), {
          method: 'DELETE'
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || '删除失败');
        }

        delete canvasFuncs[name];
        if (selectedFunc === name) {
          selectedFunc = null;
          document.getElementById('func-name-display').textContent = '请选择一个函数';
          document.getElementById('code-editor').value = '';
        }
        renderFuncList();
        showStatus(`函数 ${name} 已删除`, 'bg-green-50 text-green-700 border border-green-200');

      } catch (e) {
        showStatus('删除失败: ' + e.message, 'bg-red-50 text-red-700 border border-red-200');
      }
    }

    // ========== 工具函数 ==========
    function showStatus(msg, classes) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'fixed top-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg text-sm shadow-lg cursor-pointer max-w-lg ' + classes;
    }

    function hideStatus() {
      const el = document.getElementById('status');
      el.className = 'fixed top-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg text-sm shadow-lg cursor-pointer max-w-lg hidden';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 初始化：先加载 Canvas 函数库，再加载信息板
    loadCanvasLib().then(() => loadData());

    // AreaEditor 异步加载（CDN 可能慢，不阻塞页面）
    var ae = document.createElement('script');
    ae.src = './js/areaeditor.js';
    ae.onload = function() { new AreaEditor('#code-editor'); };
    document.head.appendChild(ae);
  </script>
</body>
</html>
